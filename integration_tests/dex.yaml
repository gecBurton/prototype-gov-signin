# Dex acts as a stand-in for Google so the "Sign in with Google" flow can be
# exercised in docker compose / the integration tests without real Google
# credentials. The iam service points the allauth Google adapter's endpoint
# URLs here (see docker-compose.yml).
#
# The issuer uses localhost because that is what the user's browser must reach
# and what ends up as `iss` in issued id_tokens; the iam container talks to
# the token endpoint via the compose-internal hostname instead, which Dex
# serves regardless of Host header.
issuer: http://localhost:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true

staticClients:
  - id: iam
    secret: iam-dex-secret
    name: IAM
    redirectURIs:
      - http://localhost:8000/accounts/google/login/callback/

enablePasswordDB: true

staticPasswords:
  - email: dex-user@example.com
    # bcrypt of "password"
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
    username: dex-user
    userID: 08a8684b-db88-4b73-90a9-3cd1661f5466
