services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: iam
      POSTGRES_USER: iam
      POSTGRES_PASSWORD: iam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI + REST API

  iam:
    build: .
    # Seeds the demo relying party (Grafana) and a demo user so `make up` is a
    # working end-to-end demo and the integration tests have data to drive. This
    # lives here, in the compose layer that owns the demo stack, rather than as
    # an application management command.
    command:
      - sh
      - -c
      - |
        set -e
        cd iam
        uv run python manage.py migrate
        uv run python manage.py shell <<'PYEOF'
        from allauth.account.models import EmailAddress
        from django.contrib.auth import get_user_model
        from oauth2_provider.models import get_application_model
        from users.models import Team

        User = get_user_model()
        Application = get_application_model()

        user, created = User.objects.get_or_create(email="demo@example.com")
        if created:
            user.set_unusable_password()
            user.save()
        EmailAddress.objects.get_or_create(
            user=user,
            email="demo@example.com",
            defaults={"primary": True, "verified": True},
        )

        # Every application must belong to a team, and a team admits users only
        # on the domains it lists. Allow example.com so the demo user can sign in.
        team, _ = Team.objects.get_or_create(name="Demo")
        team.allowed_email_domains.get_or_create(domain="example.com")
        Application.objects.update_or_create(
            client_id="grafana",
            defaults={
                "name": "Grafana",
                "client_type": Application.CLIENT_CONFIDENTIAL,
                "redirect_uris": "http://localhost:3000/login/generic_oauth",
                "client_secret": "grafana-secret",
                "skip_authorization": True,
                "team": team,
            },
        )
        PYEOF
        uv run python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ./iam/oidc.key:/app/oidc.key:ro
    environment:
      DEBUG: "true"
      SECRET_KEY: "insecure-dev-key"
      POSTGRES_HOST: db
      POSTGRES_DB: iam
      POSTGRES_USER: iam
      POSTGRES_PASSWORD: iam
      ALLOWED_HOSTS: "localhost,iam,127.0.0.1"
      # The demo user is granted Django admin access on login (see ADMIN_USERS).
      ADMIN_USERS: "demo@example.com"
      EMAIL_HOST: mailpit
      EMAIL_PORT: "1025"
      # "Sign in with Google" is wired to the local Dex stand-in (see the dex
      # service), so the flow works without real Google credentials. The
      # browser-facing URLs use localhost; the token exchange happens
      # container-to-container.
      GOOGLE_CLIENT_ID: iam
      GOOGLE_CLIENT_SECRET: iam-dex-secret
      GOOGLE_AUTHORIZE_URL: http://localhost:5556/dex/auth
      GOOGLE_ACCESS_TOKEN_URL: http://dex:5556/dex/token
      GOOGLE_ID_TOKEN_ISSUER: http://localhost:5556/dex
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
      dex:
        condition: service_started

  dex:
    image: ghcr.io/dexidp/dex:latest
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "5556:5556"
    volumes:
      - ./integration_tests/dex.yaml:/etc/dex/config.yaml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "IAM"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "grafana-secret"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "http://localhost:8000/o/authorize/"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://iam:8000/o/token/"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://iam:8000/o/userinfo/"
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_SIGNOUT_REDIRECT_URL: "http://localhost:8000/accounts/logout/"
    depends_on:
      - iam

volumes:
  postgres_data:
