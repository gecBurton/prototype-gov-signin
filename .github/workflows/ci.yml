name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: iam
          POSTGRES_USER: iam
          POSTGRES_PASSWORD: iam
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --group dev
      - run: make format-check
      - run: uv run pytest iam/tests/ -v
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: iam
          POSTGRES_USER: iam
          POSTGRES_PASSWORD: iam
