name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: iam
          POSTGRES_USER: iam
          POSTGRES_PASSWORD: iam
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --group dev
      - run: make format-check
      - run: cd iam && uv run python manage.py makemigrations --check --dry-run
        env:
          DEBUG: "true"
          SECRET_KEY: "insecure-ci-key"
          POSTGRES_HOST: localhost
      - run: uv run pytest tests/ -v
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: iam
          POSTGRES_USER: iam
          POSTGRES_PASSWORD: iam

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --group integration
      - run: uv run playwright install --with-deps chromium
      - name: Generate OIDC signing key
        run: openssl genrsa -out iam/oidc.key 4096
      - name: Start services
        run: docker compose up -d --build
      - name: Wait for services
        run: |
          timeout 120 sh -c 'until curl -fs http://localhost:8000/ > /dev/null; do sleep 2; done'
          timeout 120 sh -c 'until curl -fs http://localhost:3000/login > /dev/null; do sleep 2; done'
      - run: uv run pytest integration_tests/ -v
      - name: Show service logs
        if: failure()
        run: docker compose logs
