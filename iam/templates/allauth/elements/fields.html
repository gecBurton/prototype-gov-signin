{% load govuk_forms %}
{% for field in attrs.form.visible_fields %}
  <div class="govuk-form-group{% if field.errors %} govuk-form-group--error{% endif %}">
    <label class="govuk-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
    {% if field.help_text %}
      <div class="govuk-hint" id="{{ field.id_for_label }}-hint">{{ field.help_text }}</div>
    {% endif %}
    {% for error in field.errors %}
      <p class="govuk-error-message" id="{{ field.id_for_label }}-error">
        <span class="govuk-visually-hidden">Error:</span> {{ error }}
      </p>
    {% endfor %}
    {{ field|as_govuk }}
  </div>
{% endfor %}
{% for field in attrs.form.hidden_fields %}{{ field }}{% endfor %}
